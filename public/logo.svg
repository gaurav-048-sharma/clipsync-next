<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#facc15"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>
  <!-- Background circle with right gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#rightGrad)"/>
  <!-- Yin-yang left side -->
  <path d="M100 10 A90 90 0 0 0 100 190 A45 45 0 0 0 100 100 A45 45 0 0 1 100 10 Z" fill="url(#leftGrad)" clip-path="url(#circleClip)"/>
</svg>
